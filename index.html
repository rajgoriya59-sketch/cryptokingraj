<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Crypto King Raj</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: #0a0a0a;
  color:white;
}

/* PAGES */
.page {
  display:none;
  padding:40px;
  min-height:100vh;
}
.active { display:block; }

/* HERO */
.hero {
  text-align:center;
  margin-top:100px;
}
.hero h1 {
  font-size:40px;
  color:#00ffcc;
}
.hero p {
  color:#aaa;
  max-width:400px;
  margin:auto;
}

/* BUTTON */
.btn {
  padding:12px 20px;
  margin:10px;
  border:none;
  border-radius:8px;
  background:#00ffcc;
  color:black;
  cursor:pointer;
  font-weight:bold;
  transition:0.3s;
}
.btn:hover {
  background:#00cc99;
}

/* CARD */
.card {
  background:#111;
  padding:20px;
  margin:15px auto;
  max-width:300px;
  border-radius:15px;
  box-shadow:0 0 15px #00ffcc33;
}

/* ARROW */
.arrow {
  position:fixed;
  right:20px;
  bottom:50%;
  font-size:30px;
  cursor:pointer;
  color:#00ffcc;
}

/* CHAT */
.chatbox {
  max-width:400px;
  margin:auto;
}
.msg {
  background:#111;
  padding:10px;
  margin:5px;
  border-radius:10px;
  text-align:left;
}

/* IMAGES */
img {
  width:100%;
  border-radius:10px;
  margin-top:10px;
}

/* ADMIN */
#adminPanel {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  padding:30px;
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div id="page1" class="page active">
  <div class="hero">
    <h1>Raj Sniper</h1>
    <p>Professional Crypto Trader providing high-accuracy signals and trading education.</p>

    <button class="btn">Live Call</button>
    <button class="btn">Screen Record</button>
  </div>

  <div class="arrow" onclick="goPage(2)">➡</div>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page">
  <h2 style="text-align:center;">Crypto King Raj</h2>

  <div class="card">
    <h3>Public Signals</h3>
    <div id="publicImages"></div>
  </div>

  <div class="card">
    <h3>VIP Signals</h3>
    <div id="vipImages"></div>
  </div>

  <button class="btn" onclick="goPage(3)">Join VIP</button>
  <br>
  <button class="btn" onclick="openAdmin()">Admin</button>
</div>

<!-- PAGE 3 -->
<div id="page3" class="page">
  <h2>Join VIP</h2>

  <div class="chatbox">
    <div id="chat"></div>

    <textarea id="msg" placeholder="Type message..." style="width:100%;height:80px;"></textarea>
    <br>
    <button class="btn" onclick="sendMsg()">Send</button>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">
  <h2>Admin Upload</h2>

  <input type="file" id="imgUpload"><br><br>

  <button class="btn" onclick="addPublic()">Add Public</button>
  <button class="btn" onclick="addVIP()">Add VIP</button>
  <br>
  <button class="btn" onclick="closeAdmin()">Close</button>
</div>

<script>
function goPage(p){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.getElementById('page'+p).classList.add('active');
}

// CHAT
function sendMsg(){
  let msg = document.getElementById("msg").value;
  if(msg==="") return;

  document.getElementById("chat").innerHTML += 
  `<div class="msg"><b>You:</b> ${msg}</div>`;

  setTimeout(()=>{
    document.getElementById("chat").innerHTML += `
    <div class="msg"><b>Raj:</b><br>
    1. Follow Insta: rajtrendlinesniper9<br>
    2. Pay ₹399<br>
    3. Or join Delta & deposit $20
    </div>`;
  },500);

  document.getElementById("msg").value="";
}

// ADMIN
function openAdmin(){
  let pass = prompt("Enter password");
  if(pass==="raj123"){
    document.getElementById("adminPanel").style.display="block";
  } else {
    alert("Wrong password");
  }
}

function closeAdmin(){
  document.getElementById("adminPanel").style.display="none";
}

// IMAGE
function addPublic(){
  let file = document.getElementById("imgUpload").files[0];
  if(!file) return;
  let url = URL.createObjectURL(file);
  document.getElementById("publicImages").innerHTML += `<img src="${url}">`;
}

function addVIP(){
  let file = document.getElementById("imgUpload").files[0];
  if(!file) return;
  let url = URL.createObjectURL(file);
  document.getElementById("vipImages").innerHTML += `<img src="${url}">`;
}
</script>

</body>
</html>
