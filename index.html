<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Crypto King Raj</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  text-align: center;
}

.page {
  display: none;
  padding: 40px;
}

.active {
  display: block;
}

.btn {
  padding: 15px 25px;
  margin: 10px;
  background: lime;
  color: black;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

.arrow {
  position: fixed;
  right: 20px;
  bottom: 50%;
  font-size: 30px;
  cursor: pointer;
  color: lime;
}

.chatbox {
  width: 90%;
  max-width: 400px;
  margin: auto;
}

textarea {
  width: 100%;
  height: 80px;
}

.message {
  background: #111;
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  text-align: left;
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div id="page1" class="page active">
  <h1>Raj Sniper</h1>
  <p>Professional Crypto Trader</p>

  <p>
    Get high-probability crypto signals, real-time insights, and trading education.
  </p>

  <p>
    Free signals + VIP mentorship available.
  </p>

  <button class="btn">Live Video Call</button>
  <button class="btn">Screen Record</button>

  <div class="arrow" onclick="goPage(2)">➡</div>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page">
  <h1>Crypto King Raj Community</h1>

  <button class="btn" onclick="alert('Public Channel Coming Soon')">
    Public Channel
  </button>

  <br>

  <button class="btn" onclick="goPage(3)">
    VIP Channel
  </button>
</div>

<!-- PAGE 3 -->
<div id="page3" class="page">
  <h2>Message to Join VIP</h2>

  <div class="chatbox">
    <div id="chat"></div>

    <textarea id="msg" placeholder="Type your message"></textarea>
    <br><br>
    <button class="btn" onclick="sendMsg()">Send</button>
  </div>
</div>

<script>
function goPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page' + page).classList.add('active');
}

function sendMsg() {
  let msg = document.getElementById("msg").value;
  let chat = document.getElementById("chat");

  if(msg.trim() === "") return;

  chat.innerHTML += `<div class="message"><b>You:</b> ${msg}</div>`;

  setTimeout(() => {
    chat.innerHTML += `<div class="message"><b>Raj:</b><br>
    To join VIP:<br><br>
    1. Follow Insta: https://instagram.com/rajtrendlinesniper9<br><br>
    2. Pay ₹399<br><br>
    3. Or join Delta & deposit $20<br>
    (Link add later)
    </div>`;
  }, 500);

  document.getElementById("msg").value = "";
}
</script>

</body>
</html>
